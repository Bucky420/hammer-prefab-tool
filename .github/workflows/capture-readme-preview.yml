name: Capture README preview

on:
  push:
    paths:
      - .github/workflows/capture-readme-preview.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start app
        run: |
          npm start > /tmp/hammer-prefab-tool.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8787 >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/hammer-prefab-tool.log
          exit 1

      - name: Capture full-resolution screenshot
        run: |
          cat > /tmp/capture.mjs <<'EOF'
          import { chromium } from 'playwright';
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1920, height: 1080 }, deviceScaleFactor: 1 });
          await page.goto('http://127.0.0.1:8787', { waitUntil: 'networkidle' });
          await page.locator('[data-tool-mode="brush"]').click();
          await page.locator('[data-shape="ring"]').click();
          await page.locator('[data-generate]').click();
          await page.locator('#texture-axes-toggle').click();
          await page.waitForTimeout(500);
          await page.screenshot({ path: 'docs/hammer-prefab-tool-preview.png', type: 'png' });
          await browser.close();
          EOF
          node /tmp/capture.mjs

      - name: Replace blurry preview and clean up
        run: |
          rm -f docs/hammer-prefab-tool-preview.jpg docs/test-path.txt
          sed -i 's#docs/hammer-prefab-tool-preview.jpg#docs/hammer-prefab-tool-preview.png#' README.md
          rm -f .github/workflows/capture-readme-preview.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Replace blurry README preview with full-resolution screenshot"
          git push
